# Render 实例保活脚本（最终稳定版）
name: Keep Render Instance Alive

on:
  schedule:
    - cron: '*/3 * * * *'  # 每3分钟执行一次
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: read

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Send Keep-Alive Request
        run: |
          # 增加重试机制，最多重试3次
          for i in {1..3}; do
            echo "Attempt $i: Sending request to https://chat.13701.top"
            # 超时时间延长到 180 秒，适配 Render 冷启动
            curl -X GET \
              --max-time 180 \
              --retry 2 \
              --retry-delay 10 \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              "https://chat.13701.top" \
              -w "\nAttempt $i - Status Code: %{http_code}\nResponse Time: %{time_total}s\n" \
              -o /dev/null && break
            echo "Attempt $i failed, retrying in 10 seconds..."
            sleep 10
          done
        continue-on-error: true  # 即使全部重试失败，也不中断工作流
